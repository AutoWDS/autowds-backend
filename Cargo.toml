[package]
name = "autowds-backend"
version = "0.1.0"
edition = "2021"
authors = ["holmofy"]
license = "MIT"
description = "Auto Web Data Scraper Backend"

[dependencies]
actix-web = "4"
jsonwebtoken = "8.3"
utoipa = { version = "3", features = ["actix_extras", "chrono"] }
utoipa-swagger-ui = { version = "3", features = ["actix-web"] }
sqlx = { version = "0.7", features = [
    "runtime-tokio",
    "postgres",
    "chrono",
    "ipnetwork",
] }
ormlite = { version = "0.17", features = ["postgres"] }
deadpool-redis = "0.12"
chrono = { version = "0.4", features = ["serde"] }
ipnetwork = "0.20"
log = "0.4"
env_logger = "0.10"
dotenvy = "0.15"
envconfig = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
validator = { version = "0.16", features = ["derive"] }
actix-web-validator = "5.0"
reqwest = "0.11"
askama = "0.12"
lettre = "0.10"
rand = "0.8"
rayon = "1.7"
num_cpus = "1.0"
futures-util = "0.3"
glob = "0.3"
lazy_static = "1.4"
