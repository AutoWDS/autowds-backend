[package]
name = "autowds-backend"
version = "0.1.0"
edition = "2021"
authors = ["holmofy"]
description = "Auto Web Data Scraper Backend"

[dependencies]
actix-web = "4"
jsonwebtoken = "8.3"
rbs = { version = "4.3"}
rbatis = { version = "4.3"}
rbdc-pg={version="4.3"}
deadpool-redis = "0.12.0"
log = "0.4"
env_logger = "0.10"
dotenvy = "0.15.7"
envconfig = "0.10.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
validator = { version = "0.16", features = ["derive"] }
actix-web-validator = "5.0"
reqwest = "0.11.18"
askama = "0.12.0"
lettre = "0.10.4"
rand = "0.8.5"
rayon = "1.7"
num_cpus = "1.0"
futures-util = "0.3"
glob = "0.3.1"
lazy_static = "1.4.0"