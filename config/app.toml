[logger]
enable = true
pretty_backtrace = true
level = "${RUST_LOG_LEVEL:info}"
override_filter = "${LOG_LEVEL_FILTER:info,axum=warn}"

[web]
graceful = true
connect_info = true

[web.openapi]
doc_prefix = "/openapi/docs"
info = { title = "autowds api document", version = "0.0.1" }

[mail]
host = "smtp.163.com"                                                      # SMTP mail server address,
port = 465                                                                 # SMTP server port number
secure = true                                                              # Response timeout, in milliseconds
auth = { user = "hff1996723@163.com", password = "${MAIL_AUTH_PASSWORD}" } # Authentication information

[email]
from = "hff1996723@163.com"
# 邮件退订链接等对外 URL 前缀，需与线上访问域名一致，例如 https://autowds.example.com
public_base_url = "${PUBLIC_BASE_URL:http://127.0.0.1:8080}"

[sea-orm]
uri = "${DATABASE_URL:postgres://postgres:xudjf23adj213@localhost:5432/autowds}"

# 与 [sea-orm] 同一库即可（采集记录按 user_id 分表，用 sqlx 拼表名查询）
[sqlx]
uri = "${DATABASE_URL:postgres://postgres:xudjf23adj213@localhost:5432/autowds}"

[sea-orm-web]
one_indexed = true

# 与 autowds-instance `[s3]` 一致；`task_instance.log_key` 存在时，任务日志 SSE 会优先 GetObject 回放 NDJSON，不再订阅 Redis。
[s3]
endpoint = "${S3_ENDPOINT:}"
bucket = "${S3_BUCKET:}"
access_key_id = "${S3_ACCESS_KEY_ID:}"
secret_access_key = "${S3_SECRET_ACCESS_KEY:}"
region = "${S3_REGION:us-east-1}"
prefix = "${S3_PREFIX:}"

[redis]
uri = "${REDIS_URL:redis://localhost}"

# Apalis 任务队列命名空间（Redis 键前缀）；须与 autowds-instance [redis] queue 一致。
# 默认 i64 与历史上 `RedisStorage::<i64>::new` 隐式命名一致。
[apalis]
queue = "${APALIS_REDIS_QUEUE:i64}"

[pay]
## https://openhome.alipay.com/develop/sandbox/app
test_pay_amount = ${TEST_PAY_AMOUNT:false}
wechat_pay_enable = true # 微信配置全为环境变量
alipay_enable = true
alipay_api_url = "${ALIPAY_API_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}"
alipay_app_id = "${ALIPAY_APP_ID:2021000149633962}"
alipay_root_cert_sn = "${ALIPAY_ROOT_CERT_SN}"
alipay_public_key = "${ALIPAY_PUBLIC_KEY}"
alipay_app_cert_sn = "${ALIPAY_APP_CERT_SN}"
alipay_app_private_key = "${ALIPAY_APP_PRIVATE_KEY}"
alipay_app_public_key = "${ALIPAY_APP_PUBLIC_KEY}"
alipay_callback_url = "${ALIPAY_CALLBACK_URL:https://autowds.dtiku.cn/api/pay/notify/alipay}"
paddle_enable = ${PADDLE_ENABLE:false}
paddle_api_url = "${PADDLE_API_URL:https://sandbox-api.paddle.com}"
paddle_api_key = "${PADDLE_API_KEY:}"
paddle_webhook_secret = "${PADDLE_WEBHOOK_SECRET:}"
paddle_monthly_price_id = "${PADDLE_MONTHLY_PRICE_ID:}"
paddle_annual_price_id = "${PADDLE_ANNUAL_PRICE_ID:}"